<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sporty Live - Match Center</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<style>
:root { --primary: #E31C24; --bg: #0a0a0a; --card: #1a1a1a; }
body { margin:0; font-family:'Segoe UI', Roboto, sans-serif; background: var(--bg); color:white; }
.container { max-width:900px; margin:0 auto; padding:10px; }
header { display:flex; justify-content:space-between; align-items:center; padding:15px 0; border-bottom:1px solid #333; }
.logo { font-weight:900; font-size:24px; color: var(--primary); letter-spacing:-1px; }
.live-indicator { background: var(--primary); padding:4px 12px; border-radius:4px; font-size:12px; font-weight:bold; animation: blink 1.5s infinite; }
.match-list { margin:20px 0; }
.match-card { background: var(--card); border-radius:12px; padding:20px; margin-bottom:15px; border:1px solid #333; transition:0.3s; }
.match-card.active { border-color: var(--primary); box-shadow:0 0 15px rgba(227,28,36,0.2); }
.teams { display:flex; align-items:center; justify-content:center; gap:20px; font-size:18px; font-weight:bold; margin-bottom:15px; }
.vs { color: var(--primary); font-style:italic; font-size:14px; }
.flag { width:40px; height:25px; object-fit:cover; border-radius:2px; border:1px solid #444; }
.server-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; }
.btn-server { background:#333; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; }
.btn-server:hover { background:#444; }
.btn-server.playing { background: var(--primary); }
.player-wrapper { margin-top:30px; background:#000; border-radius:12px; overflow:hidden; border:1px solid #333; }
.video-js { width:100%; aspect-ratio:16/9; }
.player-info { padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center; }

.player-logo {
    position: absolute;   /* overlay on top of video */
    top: 10px;            /* distance from top */
    right: 5px;           /* distance from left */
    z-index: 10;         /* above the video */
    pointer-events: none; /* so clicks pass through */
    background-color: none;
}

.player-logo img {
    /* width: 100px;         adjust size */
    height: 100px;
    opacity: 1;         /* slightly transparent */
    background: transparent;
    mix-blend-mode: screen;   /* Removes the white box on dark themes */
    filter: contrast(1.2);
}

.player-wrapper {
    position: relative;  /* needed so logo is positioned inside player */
    margin-top: 30px;
    background:#000;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #333;
}
@keyframes blink { 50% { opacity:0.5; } }
@media (max-width:600px) { .teams { font-size:16px; } }
</style>
</head>
<body>
<div class="container">
<header>
    <div class="logo">SPORTY.LIVE</div>
    <div class="live-indicator">LIVE NOW</div>
</header>

<div class="match-list" id="match-list"></div>

<div class="player-wrapper">
    <video id="main-player" class="video-js vjs-big-play-centered" preload="auto">
        <p class="vjs-no-js">To view this video please enable JavaScript.</p>
    </video>
    <!-- Logo overlay -->
    <div class="player-logo">
        <img src="https://github.com/Fayaz-Codify/ecomTest/blob/main/image-Photoroom.png?raw=true" alt="Logo">
    </div>

    <div class="player-info">
        <span id="match-title">Select a server to watch...</span>
        <span style="color:#888;font-size:12px;">Auto-Reconnect: ON</span>
    </div>

    <div class="player-info">
        <span id="match-title">Select a server to watch...</span>
        <span style="color:#888;font-size:12px;">Auto-Reconnect: ON</span>
    </div>
</div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
// Initialize Video.js player
var player = videojs('main-player', {
    controls:true,
    autoplay:false,
    fluid:true,
    playbackRates:[0.5,1,1.5,2]
});

// Function to play stream
function playStream(url, title, btn){
    player.src({ src:url, type: url.includes('.mp4') ? 'video/mp4' : 'application/x-mpegURL' });
    document.getElementById('match-title').innerText = "Streaming: " + title;
    document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('playing'));
    btn.classList.add('playing');
    document.querySelector('.player-wrapper').scrollIntoView({ behavior:'smooth' });
    player.play();
}



// Video.js error handling
player.on('error', function(){
    alert("This server is full or link expired. Try another server.");
});

// SECURITY: Disable right-click, shortcuts, image drag
(function(){
    document.addEventListener('contextmenu', e=>e.preventDefault());
    document.onkeydown = function(e){
        if(e.keyCode==123 || (e.ctrlKey && e.shiftKey && e.keyCode==73) || 
           (e.ctrlKey && e.shiftKey && e.keyCode==74) || (e.ctrlKey && e.keyCode==85) || 
           (e.ctrlKey && e.keyCode==83)) return false;
    };
    document.addEventListener('dragstart', e=>e.preventDefault());
})();
</script>
<script src="match.js"></script>
</body>
</html>
